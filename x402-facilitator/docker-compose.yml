version: '3.8'

services:
  facilitator:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    ports:
      - '3402:3402'
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'wget', '--no-verbose', '--tries=1', '--spider', 'http://localhost:3402/health']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
